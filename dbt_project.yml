name: 'dbt_scooters'
version: '1.0.0'
profile: 'dbt_scooters' #'profiles.yml' 
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:         
  - "target"
  - "dbt_packages"
models:
  dbt_scooters:
    +materialized: table
    +docs:
        enabled: true
    staging:
      +docs:
        node_color: "#f1f3f4"  # 
    marts:
      +docs:
        node_color: "#e8f0fe"  # 
  docs:
    node_color: true
    +docs:
      css: |
        body { background: white; }
        .graph-container { background: white; }
        .node { stroke: #dadce0; }